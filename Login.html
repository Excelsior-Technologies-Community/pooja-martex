<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="CSS/Login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
  
<section class="name-login d-flex align-items-center justify-content-center">

  <div class="container">
    <div class="row login-box shadow-lg rounded overflow-hidden">

      <!-- Left Side -->
      <div class="col-md-6 login-wrapper text-white d-flex flex-column justify-content-center">

        <div class="p-5">
          <h5 class="logo mb-4"><img src="images/logo-white.png" class="imgs"></h5>

          <h2 class="fw-bold mb-3">
            Welcome <br> back to Martex
          </h2>

          <p class="mb-5">
            Inter congue sagittis and velna augue egestas magna suscipit purus aliquam
          </p>

          <small>© 2025 Martex. All Rights Reserved</small>
        </div>

      </div>


      <!-- Right Side -->
      <div class="col-md-6 bg-white p-5">

        <button class="btn btn-light border w-100 mb-4">
          <img src="images/google.png" class="img">
          Sign in with Google
        </button>

        <div class="text-center mb-3 text-muted">
          Or, sign in with your email
        </div>

        <form>

          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" placeholder="example@example.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" placeholder="********">
              <span class="input-group-text">
               <i class="fa fa-eye" aria-hidden="true"></i>
              </span>
            </div>
          </div>

          <div class="mb-3">
            <a href="#" class="small">Forgot your password?</a>
          </div>

          <button class="btn btn-primary w-100 mb-3">Log In</button>

          <div class="text-center">
            Don't have an account?
            <a href="#">Sign up</a>
          </div>

        </form>

      </div>

    </div>
  </div>

</section>

</body>
</html>
