<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset-password</title>
     <link rel="stylesheet" href="CSS/reset-password.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
    <section class="forgot-section d-flex align-items-center justify-content-center">

    <div class="container">

    <!-- Logo -->
    <div class="text-center mb-4">
    <img src="images/logo-blue.png" alt="logo" class="logo">
    </div>

    <!-- Card -->
    <div class="forgot-card mx-auto text-center p-5">

    <h2 class="fw-bold mb-3">Forgot your password?</h2>

    <p class="text-muted mb-4">
    Enter your email address, if an account exists <br>we‘ll send you a link to reset your password.
    </p>

    <input type="email" class="form-control mb-4 text-center" placeholder="example@email.com">

    <button class="btn btn-primary w-100 mb-3">
    Reset My Password
    </button>

    <a href="#" class="back-link">
    Never mind, I remembered!
    </a>

    </div>

    </div>

    </section>
</body>
</html>
